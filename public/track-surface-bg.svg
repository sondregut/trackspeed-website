      <rect x="1200" y="-170" width="5" height="1520" rx="2.5" fill="url(#lanePaint)"/>
      <rect x="1380" y="-170" width="5" height="1520" rx="2.5" fill="url(#lanePaint)"/>
      <rect x="1560" y="-170" width="5" height="1520" rx="2.5" fill="url(#lanePaint)"/>
      <rect x="1740" y="-170" width="5" height="1520" rx="2.5" fill="url(#lanePaint)"/>
    </g>

    <g opacity="0.2">
      <rect x="127" y="-170" width="2" height="1520" fill="url(#laneShadow)"/>
      <rect x="307" y="-170" width="2" height="1520" fill="url(#laneShadow)"/>
      <rect x="487" y="-170" width="2" height="1520" fill="url(#laneShadow)"/>
      <rect x="667" y="-170" width="2" height="1520" fill="url(#laneShadow)"/>
      <rect x="847" y="-170" width="2" height="1520" fill="url(#laneShadow)"/>
      <rect x="1027" y="-170" width="2" height="1520" fill="url(#laneShadow)"/>
      <rect x="1207" y="-170" width="2" height="1520" fill="url(#laneShadow)"/>
      <rect x="1387" y="-170" width="2" height="1520" fill="url(#laneShadow)"/>
      <rect x="1567" y="-170" width="2" height="1520" fill="url(#laneShadow)"/>
      <rect x="1747" y="-170" width="2" height="1520" fill="url(#laneShadow)"/>
    </g>

    <g opacity="0.14">
      <path d="M-40 352H1880" stroke="#f6f0e8" stroke-width="2"/>
      <path d="M-40 522H1880" stroke="#f6f0e8" stroke-width="2"/>
      <path d="M-40 692H1880" stroke="#f6f0e8" stroke-width="2"/>
      <path d="M-40 862H1880" stroke="#f6f0e8" stroke-width="2"/>
    </g>
  </g>

  <rect width="1800" height="1100" fill="black" opacity="0.16"/>
  <rect width="1800" height="1100" fill="url(#softLight)" opacity="0.5"/>
