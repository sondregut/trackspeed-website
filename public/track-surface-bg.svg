<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100" fill="none">
  <defs>
    <linearGradient id="rubber" x1="92" y1="98" x2="1655" y2="1014" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1f2f2f"/>
      <stop offset="0.34" stop-color="#263736"/>
      <stop offset="0.62" stop-color="#3a2b2b"/>
      <stop offset="1" stop-color="#141d22"/>
    </linearGradient>
    <radialGradient id="softLight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1320 230) rotate(133) scale(830 560)">
      <stop stop-color="#8ab894" stop-opacity="0.26"/>
      <stop offset="0.58" stop-color="#8ab894" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#8ab894" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lanePaint" x1="0" y1="0" x2="0" y2="1100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f4f6ee" stop-opacity="0.18"/>
      <stop offset="0.45" stop-color="#f4f6ee" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#f4f6ee" stop-opacity="0.14"/>
    </linearGradient>
    <linearGradient id="laneShadow" x1="0" y1="0" x2="0" y2="1100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.46" stop-color="#000000" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <pattern id="rubberDots" width="9" height="9" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.2" r="0.7" fill="#ffffff" opacity="0.055"/>
      <circle cx="5.8" cy="6.2" r="0.65" fill="#000000" opacity="0.16"/>
      <circle cx="7.6" cy="2.8" r="0.45" fill="#b99078" opacity="0.08"/>
    </pattern>
    <filter id="softNoise" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.22" numOctaves="3" seed="42"/>
      <feColorMatrix type="matrix" values="0.2 0 0 0 0  0 0.18 0 0 0  0 0 0.14 0 0  0 0 0 0.28 0"/>
    </filter>
    <mask id="fade">
      <rect width="1800" height="1100" fill="white"/>
      <rect y="0" width="1800" height="150" fill="url(#topFade)"/>
    </mask>
    <linearGradient id="topFade" x1="0" y1="0" x2="0" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="black" stop-opacity="0.28"/>
      <stop offset="1" stop-color="white"/>
    </linearGradient>
  </defs>

  <rect width="1800" height="1100" fill="url(#rubber)"/>
  <rect width="1800" height="1100" fill="url(#softLight)"/>
  <rect width="1800" height="1100" fill="url(#rubberDots)" opacity="0.9"/>
  <rect width="1800" height="1100" filter="url(#softNoise)" opacity="0.48"/>

  <g transform="translate(-100 -28) rotate(-9 950 560)">
    <g opacity="0.2">
      <rect x="34" y="-160" width="92" height="1500" fill="#11181d"/>
      <rect x="214" y="-160" width="92" height="1500" fill="#11181d"/>
      <rect x="394" y="-160" width="92" height="1500" fill="#11181d"/>
      <rect x="574" y="-160" width="92" height="1500" fill="#11181d"/>
      <rect x="754" y="-160" width="92" height="1500" fill="#11181d"/>
      <rect x="934" y="-160" width="92" height="1500" fill="#11181d"/>
      <rect x="1114" y="-160" width="92" height="1500" fill="#11181d"/>
      <rect x="1294" y="-160" width="92" height="1500" fill="#11181d"/>
      <rect x="1474" y="-160" width="92" height="1500" fill="#11181d"/>
      <rect x="1654" y="-160" width="92" height="1500" fill="#11181d"/>
    </g>

    <g opacity="0.78">
      <rect x="120" y="-170" width="5" height="1520" rx="2.5" fill="url(#lanePaint)"/>
      <rect x="300" y="-170" width="5" height="1520" rx="2.5" fill="url(#lanePaint)"/>
      <rect x="480" y="-170" width="5" height="1520" rx="2.5" fill="url(#lanePaint)"/>
